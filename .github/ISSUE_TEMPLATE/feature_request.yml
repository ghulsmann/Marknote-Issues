name: Feature request
description: Pitch an improvement or a new feature for Marknote.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the pitch. The strongest feature requests describe a concrete use case rather than a solution — that gives more room to find the right shape for it.

  - type: textarea
    id: details
    attributes:
      label: Details
      description: |
        Use case, proposed behaviour, and why it matters are the most useful structure.
      placeholder: |
        Use case:

        Proposed behaviour:

        Why this matters:
    validations:
      required: true
