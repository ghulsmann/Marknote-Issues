name: Bug report
description: Something in Marknote doesn't work as expected.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The in-app **About → Report a bug** flow pre-fills the box below with your description, diagnostics (version, OS, .NET runtime, settings path, active vault), and any recent crash log. Edit freely before posting.

  - type: textarea
    id: details
    attributes:
      label: Details
      description: |
        Steps to reproduce, expected result, and actual result are the most useful structure.
        Diagnostics auto-attach when filed from the app — paste them manually if filing here.
      placeholder: |
        Steps:
        1.
        2.

        Expected:

        Actual:
    validations:
      required: true
